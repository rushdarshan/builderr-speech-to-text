name: test-on-mac

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install --quiet pytest faster-whisper datasets soundfile word2number silero-vad scikit-optimize hindi-normalize pyarrow
          pip install --quiet mlx-whisper 2>/dev/null || echo "mlx-whisper not available (expected on non-Apple Silicon)"

      - name: Run unit tests
        run: |
          python tests/test_scorecard.py
          python tests/test_no_network.py
          python -m pytest tests/ -v --tb=short

      - name: Fetch dev audio
        run: python scripts/fetch_audio.py --manifest data/dev/manifest.json --out data/dev/audio

      - name: Pre-warm model cache
        run: |
          python -c "
import os
# faster-whisper models
from faster_whisper import WhisperModel
WhisperModel('tiny', download_root=None, cpu_threads=1); print('fw-tiny cached')
WhisperModel('small', download_root=None, cpu_threads=1); print('fw-small cached')
" 2>&1
          python -c "
import mlx_whisper
mlx_whisper.transcribe('data/dev/audio/fleurs_en_us_test_1674.wav', path_or_hf_repo='mlx-community/whisper-small-mlx')
print('mlx cached')
" 2>&1 || echo "mlx not available (expected)"

      - name: Run preview (dev set)
        run: |
          set -o pipefail
          python preview.py 2>&1 | tee preview_output.txt

      - name: Upload scorecard
        uses: actions/upload-artifact@v4
        with:
          name: mac-scorecard
          path: preview_output.txt
